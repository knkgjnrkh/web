<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — nlklmll的博客</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- ======== 导航栏 ======== -->
  <header class="header">
    <div class="container">
      <a class="header-back" href="../index.html">← 返回首页</a>
      <a class="header-name" href="../index.html">nlklmll的博客</a>
    </div>
  </header>

  <!-- ======== 文章头部（由 JS 填充） ======== -->
  <div class="article-header">
    <div class="container">
      <h1 class="article-title" id="article-title">加载中…</h1>
      <div class="article-meta">
        <span class="article-date" id="article-date"></span>
        <div class="post-tags" id="article-tags"></div>
      </div>
    </div>
  </div>

  <!-- ======== 三栏布局：左目录 / 中正文 / 右推荐 ======== -->
  <div class="article-layout">
    <!-- 左侧目录 -->
    <aside class="toc-sidebar" id="toc-sidebar">
      <div class="toc-sticky">
        <p class="sidebar-title">目录</p>
        <nav class="toc" id="toc"></nav>
      </div>
    </aside>

    <!-- 中间正文 -->
    <main class="article-main">
      <div class="article-content" id="content">
        <p class="loading-tip">正在加载文章…</p>
      </div>
    </main>

    <!-- 右侧推荐 -->
    <aside class="rec-sidebar" id="rec-sidebar">
      <div class="rec-sticky">
        <p class="sidebar-title">推荐阅读</p>
        <div class="rec-list" id="rec-list"></div>
      </div>
    </aside>
  </div>

  <!-- ======== 页脚 ======== -->
  <footer class="footer">
    <div class="container">
      <p class="footer-contact">📧 3396674938@qq.com</p>
      <p class="footer-copy">© 2026 nlklmll</p>
    </div>
  </footer>

  <!-- marked.js 本地文件，避免 CDN 延迟 -->
  <script src="../marked.min.js"></script>
  <script src="post.js"></script>
</body>
</html>
