<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — nlklmll的博客</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- ======== 导航栏 ======== -->
  <header class="header">
    <div class="container">
      <a class="header-back" href="../index.html">← 返回首页</a>
      <a class="header-name" href="../index.html">nlklmll的博客</a>
    </div>
  </header>

  <!-- ======== 文章头部（由 JS 填充） ======== -->
  <div class="article-header">
    <div class="container">
      <h1 class="article-title" id="article-title">加载中…</h1>
      <div class="article-meta">
        <span class="article-date" id="article-date"></span>
        <div class="post-tags" id="article-tags"></div>
      </div>
    </div>
  </div>

  <!-- ======== 文章正文（由 JS 填充） ======== -->
  <main class="article-body">
    <div class="container">
      <div class="article-content" id="content">
        <p class="loading-tip">正在加载文章…</p>
      </div>
    </div>
  </main>

  <!-- ======== 页脚 ======== -->
  <footer class="footer">
    <div class="container">
      <p class="footer-contact">📧 3396674938@qq.com</p>
      <p class="footer-copy">© 2026 nlklmll</p>
    </div>
  </footer>

  <!-- marked.js 本地文件，避免 CDN 延迟 -->
  <script src="../marked.min.js"></script>
  <script>
    (function () {
      "use strict";

      /* ——— 工具函数 ——— */

      // 从 ?file=xxx.md 获取目标文件名
      function getParam(name) {
        return new URLSearchParams(location.search).get(name);
      }

      // 解析 YAML-lite frontmatter（--- ... ---）
      function parseFrontmatter(text) {
        const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
        if (!m) return { meta: {}, body: text };
        const meta = {};
        m[1].split("\n").forEach(function (line) {
          const i = line.indexOf(":");
          if (i < 0) return;
          const key = line.slice(0, i).trim();
          let val = line.slice(i + 1).trim();
          // 简单数组：[a, b, c]
          if (val.startsWith("[") && val.endsWith("]")) {
            val = val.slice(1, -1).split(",").map(function (s) { return s.trim(); });
          }
          meta[key] = val;
        });
        return { meta: meta, body: m[2] };
      }

      // 把解析出的元数据渲染到页面头部
      function setMeta(meta) {
        const title = meta.title || "文章";
        document.title = title + " — nlklmll的博客";
        document.getElementById("article-title").textContent = title;
        document.getElementById("article-date").textContent = meta.date || "";

        const tagsEl = document.getElementById("article-tags");
        const tags = Array.isArray(meta.tags) ? meta.tags : [];
        tags.forEach(function (tag) {
          const span = document.createElement("span");
          span.className = "post-tag";
          span.textContent = tag;
          tagsEl.appendChild(span);
        });
      }

      /* ——— 主逻辑 ——— */

      const file = getParam("file");
      if (!file) {
        window.location.replace("../index.html");
        return;
      }

      // 配置 marked：图片加 loading="lazy"，首屏外的图片延迟加载
      const renderer = new marked.Renderer();
      renderer.image = function (href, title, text) {
        const titleAttr = title ? ' title="' + title + '"' : "";
        return '<img src="' + href + '" alt="' + (text || "") + '"' + titleAttr + ' loading="lazy">';
      };
      marked.setOptions({ breaks: true, renderer: renderer });

      fetch(file)
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        })
        .then(function (text) {
          const parsed = parseFrontmatter(text);
          setMeta(parsed.meta);
          document.getElementById("content").innerHTML = marked.parse(parsed.body);
        })
        .catch(function () {
          document.getElementById("article-title").textContent = "加载失败";
          document.getElementById("content").innerHTML =
            "<p>文章加载失败。如果是本地预览，请使用 HTTP 服务器（VS Code → Live Server）而非直接打开文件。</p>";
        });
    })();
  </script>
</body>
</html>
