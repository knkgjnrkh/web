<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nlklmll的博客</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ======== 导航栏 ======== -->
  <header class="header">
    <div class="container">
      <a class="header-name" href="index.html">nlklmll</a>
      <span class="header-tag">个人博客</span>
    </div>
  </header>

  <!-- ======== 个人介绍区 ======== -->
  <section class="hero">
    <div class="container">
      <div class="hero-avatar">
        <img class="avatar-img" src="nlklmll.jpg" alt="nlklmll头像">
      </div>
      <h1 class="hero-name">nlklmll</h1>
      <p class="hero-title">渗透测试工程师</p>
      <p class="hero-bio">长沙学院通信工程本科，具备从漏洞挖掘到提供漏洞修复建议的独立渗透测试能力</p>
    </div>
  </section>

  <!-- ======== 文章列表区 ======== -->
  <main class="posts-section">
    <div class="container">
      <div class="posts-head">
        <h2 class="section-title">📝 全部文章</h2>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="search-input"
                 placeholder="搜索文章标题或标签…" autocomplete="off">
        </div>
      </div>
      <div class="post-list" id="post-list">
        <p class="loading-tip">正在加载文章…</p>
      </div>
      <p class="no-result" id="no-result" hidden>没有匹配的文章</p>
    </div>
  </main>

  <!-- ======== 页脚 ======== -->
  <footer class="footer">
    <div class="container">
      <p class="footer-contact">📧 3396674938@qq.com</p>
      <p class="footer-copy">© 2026 nlklmll</p>
    </div>
  </footer>

  <script>
    (function () {
      "use strict";
      var listEl = document.getElementById("post-list");
      var noResult = document.getElementById("no-result");
      var searchInput = document.getElementById("search-input");
      var allPosts = [];

      // 转义 HTML，防止标题/标签里的特殊字符破坏结构
      function esc(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
      }

      function cardHTML(p) {
        var tags = (p.tags || []).map(function (t) {
          return '<span class="post-tag">' + esc(t) + "</span>";
        }).join("");
        return '<a class="post-card" href="posts/post.html?file=' + encodeURIComponent(p.file) + '">' +
          '<div class="post-card-body">' +
          '<h3 class="post-card-title">' + esc(p.title) + "</h3>" +
          '<p class="post-card-excerpt">' + esc(p.excerpt || "") + "</p>" +
          '<div class="post-card-meta">' +
          '<span class="post-date">' + esc(p.date || "") + "</span>" +
          '<div class="post-tags">' + tags + "</div>" +
          "</div></div>" +
          '<span class="post-card-arrow" aria-hidden="true">→</span></a>';
      }

      function render(posts) {
        if (!posts.length) {
          listEl.innerHTML = "";
          noResult.hidden = false;
          return;
        }
        noResult.hidden = true;
        listEl.innerHTML = posts.map(cardHTML).join("");
      }

      function filter(kw) {
        kw = kw.trim().toLowerCase();
        if (!kw) return allPosts;
        return allPosts.filter(function (p) {
          var hay = (p.title + " " + (p.tags || []).join(" ")).toLowerCase();
          return hay.indexOf(kw) >= 0;
        });
      }

      searchInput.addEventListener("input", function () {
        render(filter(this.value));
      });

      fetch("posts.json?t=" + Date.now())
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function (data) {
          allPosts = data;
          render(allPosts);
        })
        .catch(function () {
          listEl.innerHTML =
            '<p class="loading-tip">文章加载失败。本地预览请用 HTTP 服务器（preview.bat），而非直接打开文件。</p>';
        });
    })();
  </script>
</body>
</html>
